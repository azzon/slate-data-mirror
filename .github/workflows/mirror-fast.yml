name: Mirror fast endpoints

# Lightweight endpoints: securities, macro, north_flow, lhb, yjyg,
# margin, news. Each is a single API call (or very few).
# research is per-ticker (5500×) and lives in mirror-slow.yml.
# Safe to run every few hours without triggering any rate-limits.
#
# CN cron: 06:00 / 10:00 / 14:00 / 18:00 / 22:00
on:
  schedule:
    - cron: "0 22 * * *"   # 06:00 CST — pre-open
    - cron: "0 2 * * *"    # 10:00 CST — mid-morning
    - cron: "0 6 * * *"    # 14:00 CST — afternoon
    - cron: "0 10 * * *"   # 18:00 CST — after-close aggregates
    - cron: "0 14 * * *"   # 22:00 CST — evening LHB / yjyg
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated endpoint names (empty = all fast)"
        required: false
        default: ""
      force:
        description: "Ignore cadence"
        required: false
        default: "false"

concurrency:
  # Own group so a running market_daily pass (up to 30 min) doesn't
  # queue news/yjyg/lhb fetches. The single self-hosted runner
  # serialises anyway, but GitHub's scheduler will pick up a queued
  # fast workflow immediately after the previous job's runner releases.
  group: mirror-fast
  cancel-in-progress: false

jobs:
  fetch-and-push:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout via SSH-over-443
        timeout-minutes: 5
        run: |
          set -e
          WORK="${{ github.workspace }}"
          mkdir -p "$WORK"
          cd "$WORK"
          if [ -d .git ]; then
            git remote set-url origin git@github.com:azzon/slate-data-mirror.git
            git fetch --depth=1 origin main
            git checkout --detach FETCH_HEAD
            # Preserve .venv + caches (was clean -ffdx which wiped them
            # and forced pip reinstall every run).
            git clean -fd -e .venv -e .cache -e __pycache__
            git gc --auto --quiet || true
          else
            git clone --depth 1 git@github.com:azzon/slate-data-mirror.git .
          fi

      - name: Ensure Python deps
        run: |
          python3 -m venv .venv
          PIP_INDEX_URL="https://pypi.tuna.tsinghua.edu.cn/simple"
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" --upgrade pip
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" -r requirements.txt

      - name: Configure git identity + SSH remote
        run: |
          git config user.email "mirror-bot@slate"
          git config user.name "slate-mirror-bot"
          git remote set-url origin git@github.com:azzon/slate-data-mirror.git

      - name: Fetch
        env:
          ONLY: ${{ github.event.inputs.only }}
          FORCE: ${{ github.event.inputs.force }}
          MIRROR_AKSHARE_SLEEP: "1.5"
        run: |
          if [ -z "$ONLY" ]; then
            # filings added — 7-day rolling window of 沪深京 announcements
            # from cninfo. Slate on the consumer side can't reach cninfo
            # through Intel's proxy (blocked as "Finance and Banking"),
            # so this mirror endpoint is the ONLY path that populates
            # fact_deep downstream. 6h cadence.
            ONLY="securities,macro,filings,north_flow,lhb,yjyg,margin,news"
          fi
          args="--only $ONLY"
          if [ "$FORCE" = "true" ]; then args="$args --force"; fi
          .venv/bin/python scripts/fetch_all.py $args

      - name: Final sweep push
        if: always()
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "nothing to sweep"
            exit 0
          fi
          git commit -m "data: final sweep $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin HEAD:main
