name: Mirror AKShare

on:
  # Five passes per day (UTC). CN time: 01:30 / 05:30 / 09:30 / 13:30 / 17:30.
  # Covers: pre-open, post-market snapshot, intraday, post-close, late-evening LHB.
  schedule:
    - cron: "30 17 * * *"
    - cron: "30 21 * * *"
    - cron: "30 1 * * *"
    - cron: "30 5 * * *"
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated endpoint names (empty = all due)"
        required: false
        default: ""
      force:
        description: "Ignore cadence and re-fetch everything"
        required: false
        default: "false"

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  fetch-and-push:
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure Python deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          # Pin nothing — AKShare ships anti-scrape fixes in patch releases.
          .venv/bin/pip install --quiet -r requirements.txt
          .venv/bin/python -c "import akshare; print('akshare', akshare.__version__)"

      - name: Fetch
        env:
          ONLY: ${{ github.event.inputs.only }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          args=""
          if [ -n "$ONLY" ]; then args="--only $ONLY"; fi
          if [ "$FORCE" = "true" ]; then args="$args --force"; fi
          .venv/bin/python scripts/fetch_all.py $args

      - name: Commit + push
        run: |
          git config user.email "mirror-bot@slate"
          git config user.name "slate-mirror-bot"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: snapshot $ts"
          # Runner uses SSH remote (HTTPS to github.com is flaky from this ISP).
          git push origin HEAD:main

      - name: Status summary
        if: always()
        run: |
          if [ -f data/_status.json ]; then
            echo "### Mirror status" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/_status.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
