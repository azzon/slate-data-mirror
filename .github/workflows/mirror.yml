name: Mirror AKShare

on:
  # Five passes per day (UTC). CN time: 01:30 / 05:30 / 09:30 / 13:30 / 17:30.
  # Covers: pre-open, post-market snapshot, intraday, post-close, late-evening LHB.
  schedule:
    - cron: "30 17 * * *"
    - cron: "30 21 * * *"
    - cron: "30 1 * * *"
    - cron: "30 5 * * *"
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated endpoint names (empty = all due)"
        required: false
        default: ""
      force:
        description: "Ignore cadence and re-fetch everything"
        required: false
        default: "false"

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  fetch-and-push:
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - name: Diag (pre-checkout)
        run: |
          echo "== runner env =="
          uname -a; whoami; pwd; echo "HOME=$HOME"
          echo "== active connections to github =="
          ss -tnp 2>/dev/null | grep -i github || echo "(no github tcp sessions)"
          echo "== disk =="
          df -h ${GITHUB_WORKSPACE:-.} | tail -2
          echo "== prior _work contents =="
          ls -la "${RUNNER_WORKSPACE:-.}/.." 2>/dev/null | head -20 || true
          echo "== git version =="
          git --version
          echo "== known_hosts =="
          cat ~/.ssh/known_hosts 2>/dev/null | head -5
          echo "== try ssh to github.com (via the runner user's ~/.ssh/config forcing :443) =="
          timeout 20 ssh -o BatchMode=yes -T git@github.com 2>&1 | head -5 || echo "ssh probe timed out"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        timeout-minutes: 5

      - name: Ensure Python deps
        run: |
          python3 -m venv .venv
          # CN mirror — pypi.org from mainland is slow/flaky enough that
          # akshare+pandas+pyarrow (~100 MB) regularly stalls past 10 min.
          PIP_INDEX_URL="https://pypi.tuna.tsinghua.edu.cn/simple"
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" --upgrade pip
          # Pin nothing — AKShare ships anti-scrape fixes in patch releases.
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" -r requirements.txt
          .venv/bin/python -c "import akshare; print('akshare', akshare.__version__)"

      - name: Fetch
        env:
          ONLY: ${{ github.event.inputs.only }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          args=""
          if [ -n "$ONLY" ]; then args="--only $ONLY"; fi
          if [ "$FORCE" = "true" ]; then args="$args --force"; fi
          .venv/bin/python scripts/fetch_all.py $args

      - name: Commit + push
        run: |
          git config user.email "mirror-bot@slate"
          git config user.name "slate-mirror-bot"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: snapshot $ts"
          # Runner uses SSH remote (HTTPS to github.com is flaky from this ISP).
          git push origin HEAD:main

      - name: Status summary
        if: always()
        run: |
          if [ -f data/_status.json ]; then
            echo "### Mirror status" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/_status.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
