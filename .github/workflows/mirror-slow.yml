name: Mirror slow endpoints (weekly + daily retry)

# Per-ticker bulk endpoints that burn a lot of AKShare calls:
# financials, concepts, industries, research, shareholders.
#
# Strictly serial fetch with MIRROR_AKSHARE_SLEEP=2s between calls.
# ~5500 tickers × 2s = ~3h for financials. Concepts/industries are
# a few hundred boards each (much faster).
#
# Primary schedule: Sun 03:00 CST. Plus a daily 02:30 CST pre-check —
# if the last successful pass is older than 6 days, run it now. That
# way a failed weekly run self-heals on Mon/Tue instead of waiting a
# full week.
on:
  schedule:
    - cron: "0 19 * * 6"   # Sat 19:00 UTC = Sun 03:00 CST (primary)
    - cron: "30 18 * * 0,1,2,3,4,5"  # Mon-Sat 18:30 UTC = 02:30 CST (retry)
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated endpoint names (empty = all slow)"
        required: false
        default: ""
      force:
        description: "Ignore age check, run now"
        required: false
        default: "false"

concurrency:
  # Own group so the 3h weekly pass doesn't block fast/market crons.
  group: mirror-slow
  cancel-in-progress: false

jobs:
  fetch-slow:
    runs-on: self-hosted
    timeout-minutes: 360
    steps:
      - name: Checkout via SSH-over-443
        timeout-minutes: 5
        run: |
          set -e
          WORK="${{ github.workspace }}"
          mkdir -p "$WORK"
          cd "$WORK"
          if [ -d .git ]; then
            git remote set-url origin git@github.com:azzon/slate-data-mirror.git
            git fetch --depth=1 origin main
            git checkout --detach FETCH_HEAD
            git clean -ffdx
          else
            git clone --depth 1 git@github.com:azzon/slate-data-mirror.git .
          fi

      - name: Ensure Python deps
        run: |
          python3 -m venv .venv
          PIP_INDEX_URL="https://pypi.tuna.tsinghua.edu.cn/simple"
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" --upgrade pip
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" -r requirements.txt

      - name: Configure git identity + SSH remote
        run: |
          git config user.email "mirror-bot@slate"
          git config user.name "slate-mirror-bot"
          git remote set-url origin git@github.com:azzon/slate-data-mirror.git

      - name: Decide whether to run
        id: decide
        env:
          FORCE: ${{ github.event.inputs.force }}
          EVENT: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
        run: |
          # Always run on manual dispatch or on the primary (Sun) cron.
          # For the Mon-Sat retry cron, only run if the last successful
          # financials pass is >6 days ago (i.e. a primary run was missed
          # or failed).
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$FORCE" = "true" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"; echo "reason=manual"; exit 0
          fi
          if [ "$CRON" = "0 19 * * 6" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"; echo "reason=primary"; exit 0
          fi
          # Retry cron — delegate to scripts/slow_decide.py (one
          # key=value per line; whitespace-safe).
          python3 scripts/slow_decide.py | tee /tmp/slow_decide.out
          run_val=$(grep -E '^run=' /tmp/slow_decide.out | head -1 | cut -d= -f2-)
          echo "run=${run_val}" >> "$GITHUB_OUTPUT"

      - name: Fetch slow endpoints
        if: steps.decide.outputs.run == 'yes'
        env:
          ONLY: ${{ github.event.inputs.only }}
          MIRROR_AKSHARE_SLEEP: "2.0"
        run: |
          if [ -z "$ONLY" ]; then
            ONLY="shareholders,concepts,industries,research,financials"
          fi
          .venv/bin/python scripts/fetch_all.py --only $ONLY

      - name: Final sweep push
        if: always()
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "nothing to sweep"
            exit 0
          fi
          git commit -m "data: slow sweep $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin HEAD:main

      - name: Prune old history snapshots
        if: steps.decide.outputs.run == 'yes'
        run: .venv/bin/python scripts/prune_history.py
