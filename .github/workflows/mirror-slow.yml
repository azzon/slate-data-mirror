name: Mirror slow endpoints (chunked)

# Per-ticker bulk endpoints. Each individual endpoint can take hours
# (financials ~3h, research ~3.5h, concepts ~20m, industries ~20m,
# shareholders ~5m). Running all of them serially was 7+ hours —
# exceeded GitHub's 6h job limit AND blocked the single-runner fast
# crons for a whole day.
#
# Solution: run ONE endpoint group per trigger. Three weekly chunks:
#   Sun 03:00 CST → financials + shareholders (~3.2h)
#   Wed 03:00 CST → research (~3.5h)
#   Fri 03:00 CST → concepts + industries (~40m)
#
# Plus a daily Mon-Sat 02:30 CST pre-check that fills in whichever
# weekly chunks are overdue (>6 days since last success for that
# chunk's anchor endpoint).
on:
  schedule:
    # Daily 19:00 UTC = 03:00 CST — financials chunk i=day_of_year%7
    # (full universe refreshed weekly, ~20min per run, ≤300MB RAM).
    # Wave 10: moved from weekly to daily after audit found financials
    # had never successfully completed the 3h+ weekly pass (timeouts
    # + 2G OOM on the ECS runner).
    - cron: "0 19 * * *"
    # Tue 19:00 UTC = Wed 03:00 CST (research)
    - cron: "0 19 * * 2"
    # Thu 19:00 UTC = Fri 03:00 CST (concepts + industries)
    - cron: "0 19 * * 4"
    # Sat 19:00 UTC = Sun 03:00 CST (shareholders — weekly is fine,
    # data changes slowly and each pass is ~5min)
    - cron: "0 19 * * 6"
    # Daily 18:30 UTC = 02:30 CST (retry for missed chunks — still
    # useful for research / concepts / industries which are weekly)
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated endpoint names (empty = picked by cron slot)"
        required: false
        default: ""
      force:
        description: "Ignore age check, run now"
        required: false
        default: "false"

concurrency:
  group: mirror-slow
  cancel-in-progress: false

jobs:
  fetch-slow:
    runs-on: self-hosted
    # 4h hard cap per chunk — each chunk sized to fit comfortably.
    timeout-minutes: 240
    steps:
      - name: Checkout via SSH-over-443 + disk-budget re-shallow
        timeout-minutes: 5
        env:
          WORK: ${{ github.workspace }}
          REPO_URL: git@github.com:azzon/slate-data-mirror.git
          GIT_BUDGET_MB: "300"
        run: bash /home/runner/mirror-checkout.sh

      - name: Ensure Python deps
        run: |
          python3 -m venv .venv
          PIP_INDEX_URL="https://pypi.tuna.tsinghua.edu.cn/simple"
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" --upgrade pip
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" -r requirements.txt

      - name: Configure git identity + SSH remote
        run: |
          git config user.email "mirror-bot@slate"
          git config user.name "slate-mirror-bot"
          git remote set-url origin git@github.com:azzon/slate-data-mirror.git

      - name: Decide which chunk + whether to run
        id: decide
        env:
          FORCE: ${{ github.event.inputs.force }}
          EVENT: ${{ github.event_name }}
          CRON: ${{ github.event.schedule }}
          INPUT_ONLY: ${{ github.event.inputs.only }}
        run: |
          # Manual dispatch with explicit `only` → run exactly that
          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$INPUT_ONLY" ]; then
            echo "endpoints=$INPUT_ONLY" >> "$GITHUB_OUTPUT"
            echo "run=yes" >> "$GITHUB_OUTPUT"
            echo "reason=manual_explicit"
            exit 0
          fi
          # Manual dispatch with force (no endpoints specified) → Sunday's chunk
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" = "true" ]; then
            echo "endpoints=financials,shareholders" >> "$GITHUB_OUTPUT"
            echo "run=yes" >> "$GITHUB_OUTPUT"
            echo "reason=manual_force"
            exit 0
          fi
          # Primary crons — each picks its own chunk.
          # NOTE: GitHub's cron is evaluated loosely; when two crons fire at
          # the same wall-clock minute (e.g. "0 19 * * *" and "0 19 * * 6"),
          # GitHub runs each separately. Order below is specificity-first so
          # the day-specific crons match before the daily catch-all.
          case "$CRON" in
            "0 19 * * 2")
              echo "endpoints=research" >> "$GITHUB_OUTPUT"
              echo "run=yes" >> "$GITHUB_OUTPUT"
              echo "reason=wed_primary"
              ;;
            "0 19 * * 4")
              echo "endpoints=concepts,industries" >> "$GITHUB_OUTPUT"
              echo "run=yes" >> "$GITHUB_OUTPUT"
              echo "reason=fri_primary"
              ;;
            "0 19 * * 6")
              echo "endpoints=shareholders" >> "$GITHUB_OUTPUT"
              echo "run=yes" >> "$GITHUB_OUTPUT"
              echo "reason=sat_primary"
              ;;
            "0 19 * * *")
              # Daily financials chunk (1/7 of universe per day).
              echo "endpoints=financials" >> "$GITHUB_OUTPUT"
              echo "run=yes" >> "$GITHUB_OUTPUT"
              echo "reason=daily_financials_chunk"
              ;;
            "30 18 * * *")
              # Retry cron — scripts/slow_decide.py emits the stalest chunk.
              python3 scripts/slow_decide.py | tee /tmp/slow_decide.out
              run_val=$(grep -E '^run=' /tmp/slow_decide.out | head -1 | cut -d= -f2-)
              echo "run=${run_val}" >> "$GITHUB_OUTPUT"
              if [ "$run_val" = "yes" ]; then
                  endpoints_val=$(grep -E '^endpoints=' /tmp/slow_decide.out | head -1 | cut -d= -f2-)
                  echo "endpoints=${endpoints_val}" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "run=no" >> "$GITHUB_OUTPUT"
              echo "reason=unknown_cron"
              ;;
          esac

      - name: Fetch chunk
        if: steps.decide.outputs.run == 'yes'
        env:
          ENDPOINTS: ${{ steps.decide.outputs.endpoints }}
          MIRROR_AKSHARE_SLEEP: "2.0"
        run: |
          echo "Running endpoints: $ENDPOINTS"
          .venv/bin/python scripts/fetch_all.py --only "$ENDPOINTS"

      - name: Final sweep push
        if: always()
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "nothing to sweep"
            exit 0
          fi
          git commit -m "data: slow chunk sweep $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin HEAD:main

      - name: Prune old history snapshots
        if: steps.decide.outputs.run == 'yes'
        run: .venv/bin/python scripts/prune_history.py
