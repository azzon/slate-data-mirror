name: History backfill (filings + lhb + yjyg)

# One-shot + scheduled 5-year history backfill (Wave 12).
#
# Why: SLATE's grade(scope='signal') needs 1y+ historical data to be
# meaningful. This workflow populates all "per-day historical" endpoints:
#   - filings  (cninfo 公告)    → 5y
#   - lhb      (龙虎榜)          → 5y
#   - yjyg     (业绩预告)         — now done inline in fetch_yjyg (20q)
#
# Each backfill script:
#   - Resumable via data/_{endpoint}_backfill_progress.json
#   - Skips days with existing parquet (immutable once written)
#   - 60-day commit batches (crash-safe)
#   - Peak-skip 15:00-17:00 CST
#
# Design:
# - Serial per-day akshare calls with AKSHARE_SLEEP=1.5s throttle
#   (1825 days × 1.5s + fetch ≈ 2.5 hours full run, typically less
#   with non-trading-day skips and cached resume).
# - Resumable via data/_filings_backfill_progress.json — any per-day
#   parquet already present is skipped, so killing the workflow and
#   restarting is safe.
# - Commits + pushes every 60 successfully-written days to avoid
#   losing 2h of work on a runner crash.
# - Peak-skip: sleeps through 15:00-17:00 CST window (cninfo flood).
#
# Trigger:
#   * Manual: workflow_dispatch with optional start_date / end_date
#     / batch_days overrides.
#   * Also scheduled daily at 23:00 CST (15:00 UTC) — a "no-op" cron
#     that does nothing if backfill is complete (every day's parquet
#     exists), but fills any gap that opened up (e.g. earlier aborted
#     pass left holes). Idempotent + cheap.

on:
  schedule:
    # Daily 15:00 UTC = 23:00 CST — off-hours gap-fill.
    # 7x24 design (W11): the runner is idle ~20h/day on the normal
    # cron schedule. A nightly backfill pass uses that slack to heal
    # any historical gaps without competing with fast-cron slots.
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "ISO date, e.g. 2020-01-01. Default: today - 5y."
        required: false
        default: ""
      end_date:
        description: "ISO date. Default: today - 31d (recent covered by cron)."
        required: false
        default: ""
      batch_days:
        description: "Commit+push every N successful days"
        required: false
        default: "60"
      max_errors:
        description: "Abort after N consecutive day failures"
        required: false
        default: "20"

concurrency:
  # Share group with mirror-slow so we don't pile two multi-hour
  # jobs on the single runner concurrently. mirror-fast (4h cadence)
  # can queue behind briefly; cross-workflow cancel is off so the
  # backfill-in-progress isn't killed by a fast cron.
  group: mirror-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: self-hosted
    # 5h cap — well past expected 2.5h duration. If we hit this,
    # next schedule picks up where we left off via _filings_backfill_progress.
    timeout-minutes: 300
    steps:
      - name: Checkout via SSH-over-443
        timeout-minutes: 5
        env:
          WORK: ${{ github.workspace }}
          REPO_URL: git@github.com:azzon/slate-data-mirror.git
          GIT_BUDGET_MB: "300"
        run: bash /home/runner/mirror-checkout.sh

      - name: Ensure Python deps
        run: |
          python3 -m venv .venv
          PIP_INDEX_URL="https://pypi.tuna.tsinghua.edu.cn/simple"
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" --upgrade pip
          .venv/bin/pip install --quiet --index-url "$PIP_INDEX_URL" -r requirements.txt

      - name: Configure git identity + SSH remote
        run: |
          git config user.email "mirror-bot@slate"
          git config user.name "slate-mirror-bot"
          git remote set-url origin git@github.com:azzon/slate-data-mirror.git

      - name: Run filings backfill
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          BATCH_DAYS: ${{ github.event.inputs.batch_days || '60' }}
          MAX_ERRORS: ${{ github.event.inputs.max_errors || '20' }}
          MIRROR_AKSHARE_SLEEP: "1.5"
        # continue-on-error — if filings backfill hits max_errors we
        # still want LHB to get its share of the runner time.
        continue-on-error: true
        run: |
          args=""
          [ -n "$START_DATE" ] && args="$args --start-date $START_DATE"
          [ -n "$END_DATE" ] && args="$args --end-date $END_DATE"
          [ -n "$BATCH_DAYS" ] && args="$args --batch-days $BATCH_DAYS"
          [ -n "$MAX_ERRORS" ] && args="$args --max-errors $MAX_ERRORS"
          echo "Running: scripts/backfill_filings.py $args"
          .venv/bin/python scripts/backfill_filings.py $args

      - name: Run LHB backfill
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          BATCH_DAYS: ${{ github.event.inputs.batch_days || '60' }}
          MAX_ERRORS: ${{ github.event.inputs.max_errors || '20' }}
          MIRROR_AKSHARE_SLEEP: "1.5"
        continue-on-error: true
        run: |
          args=""
          [ -n "$START_DATE" ] && args="$args --start-date $START_DATE"
          [ -n "$END_DATE" ] && args="$args --end-date $END_DATE"
          [ -n "$BATCH_DAYS" ] && args="$args --batch-days $BATCH_DAYS"
          [ -n "$MAX_ERRORS" ] && args="$args --max-errors $MAX_ERRORS"
          echo "Running: scripts/backfill_lhb.py $args"
          .venv/bin/python scripts/backfill_lhb.py $args

      - name: Final sweep push
        if: always()
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "nothing to sweep"
            exit 0
          fi
          git commit -m "backfill: final sweep $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin HEAD:main
