name: Mirror healthcheck

# Runs on GitHub-hosted runners (no data access needed — just reads
# committed _status.json from the repo), so it's immune to self-hosted
# runner outages. Opens a GitHub issue when any endpoint has been
# failing for 3+ consecutive attempts or is stale beyond 2× cadence.
#
# Runs 3×/day at 03:00, 11:00, 19:00 UTC (CN 11:00/19:00/03:00) —
# spread out so one flake doesn't dominate.

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Analyze _status.json
        id: analyze
        run: |
          python3 scripts/healthcheck.py > /tmp/hc.out || true
          cat /tmp/hc.out
          # emit findings so the next step can branch
          if grep -q '^ALERT' /tmp/hc.out; then
            echo "has_alert=yes" >> "$GITHUB_OUTPUT"
            echo "body_file=/tmp/hc.out" >> "$GITHUB_OUTPUT"
          else
            echo "has_alert=no" >> "$GITHUB_OUTPUT"
          fi
      - name: Ensure mirror-health label exists
        if: steps.analyze.outputs.has_alert == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent — `--force` overwrites if the label exists.
          gh label create mirror-health \
              --color B60205 \
              --description "Automated alerts from scripts/healthcheck.py" \
              --force

      - name: Open / update tracking issue
        if: steps.analyze.outputs.has_alert == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reuse an existing "mirror-health" issue if present; else create.
          existing=$(gh issue list --label mirror-health --state open --json number --jq '.[0].number // empty')
          body=$(cat /tmp/hc.out)
          if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "$body"
          else
              gh issue create --title "mirror health: endpoints unhealthy" \
                              --label mirror-health \
                              --body "$body"
          fi

      # Wave 13 — auto-heal: parse alert output and kick off a retry
      # workflow for the stale endpoint. Rate-limited to avoid infinite
      # re-trigger loops; the retry itself writes _status.json so next
      # healthcheck sees fresh data.
      - name: Auto-trigger endpoint retry
        if: steps.analyze.outputs.has_alert == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract stale endpoint names from the healthcheck output.
          # healthcheck.py emits lines like:
          #   ALERT concepts: stale 32h (cadence 168h)
          stale_names=$(grep '^ALERT' /tmp/hc.out | awk '{print $2}' | tr -d ':' | sort -u | tr '\n' ',' | sed 's/,$//')
          if [ -z "$stale_names" ]; then
              echo "no stale endpoint names parsed; skipping auto-retry"
              exit 0
          fi
          # Don't auto-retry more than once per healthcheck (8h apart
          # anyway). The retry workflow commits _status.json — if the
          # retry also failed, the next healthcheck will surface a new
          # alert, but no loop.
          fast_endpoints="securities,macro,filings,north_flow,lhb,yjyg,margin,news"
          slow_endpoints="financials,shareholders,concepts,industries,research"
          to_retry_fast=""
          to_retry_slow=""
          for ep in $(echo "$stale_names" | tr ',' ' '); do
              if echo "$fast_endpoints" | grep -q "\b$ep\b"; then
                  to_retry_fast="$to_retry_fast,$ep"
              elif echo "$slow_endpoints" | grep -q "\b$ep\b"; then
                  to_retry_slow="$to_retry_slow,$ep"
              fi
          done
          to_retry_fast=$(echo "$to_retry_fast" | sed 's/^,//')
          to_retry_slow=$(echo "$to_retry_slow" | sed 's/^,//')
          if [ -n "$to_retry_fast" ]; then
              echo "Auto-retrying fast endpoints: $to_retry_fast"
              gh workflow run mirror-fast.yml --field only="$to_retry_fast" --field force=true
          fi
          if [ -n "$to_retry_slow" ]; then
              echo "Auto-retrying slow endpoints: $to_retry_slow"
              gh workflow run mirror-slow.yml --field only="$to_retry_slow"
          fi
