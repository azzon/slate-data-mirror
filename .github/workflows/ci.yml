name: CI

# Runs pure-Python unit tests on a GitHub-hosted runner (no self-hosted
# needed, no network access to AKShare/Tencent). Catches regressions in
# cadence gates, merge semantics, slow_decide, healthcheck before they
# reach the self-hosted cron.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # akshare pulled by requirements.txt only matters for its
          # transitive deps; tests don't actually call it.
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -q
